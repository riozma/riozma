<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/src/site-init.js"></script>
  <title>Politik – Manuel Rio Zeltner</title>
  <link rel="icon" href="/src/img/favicon.svg">
  <meta name="description" content="Politische Beiträge von Manuel Rio Zeltner.">
  <meta name="theme-color" content="#dbedd8">
  <link rel="canonical" href="https://riozma.ch/politik/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Politik – Manuel Rio Zeltner">
  <meta property="og:url" content="https://riozma.ch/politik/">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="site-body">
  <header class="site-header" data-site-header data-header-context="main"></header>

  <main class="politik-main">
    <div class="podcast-banner">
      <p class="podcast-banner-label">Im Aufbau</p>
      <p>Die Politik-Website wird gerade aufgebaut. Bis alles fertig ist, findest du mich im Podcast:</p>
      <a href="https://esschlohtoeufi.ch" target="_blank" rel="noopener" class="btn btn-primary">Es schloht öufi → esschlohtoeufi.ch</a>
    </div>

    <div class="politik-header">
      <h1 class="newspaper-masthead">Politik</h1>
      <p class="newspaper-tagline">Beiträge & Gedanken von Manuel Rio Zeltner</p>
      <div id="auth-container" class="auth-container-slot"></div>
    </div>

    <section id="admin-panel" class="admin-panel d-none">
      <h2>Neuen Beitrag erstellen</h2>
      <form id="post-form">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label" for="post-title">Titel</label>
            <input type="text" class="form-control" id="post-title" required>
          </div>
          <div class="col-md-4">
            <label class="form-label" for="post-slug">URL-Slug</label>
            <input type="text" class="form-control" id="post-slug" placeholder="automatisch">
          </div>
          <div class="col-12">
            <label class="form-label" for="post-subtitle">Untertitel / Lead</label>
            <input type="text" class="form-control" id="post-subtitle">
          </div>
          <div class="col-12">
            <label class="form-label" for="post-excerpt">Kurzbeschreibung (Teaser)</label>
            <textarea class="form-control" id="post-excerpt" rows="2"></textarea>
          </div>
          <div class="col-12">
            <label class="form-label" for="post-content">Text (Absätze mit Leerzeile trennen)</label>
            <textarea class="form-control" id="post-content" rows="10" required></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="post-cover">Titelbild (optional)</label>
            <input type="file" class="form-control" id="post-cover" accept="image/jpeg,image/png,image/webp">
          </div>
          <div class="col-md-6 d-flex align-items-end gap-2 flex-wrap">
            <button type="submit" class="btn btn-primary">Als Entwurf speichern</button>
            <button type="button" class="btn btn-success" id="post-publish">Veröffentlichen</button>
          </div>
        </div>
        <p id="post-form-message" class="admin-message"></p>
      </form>
      <hr>
      <h3>Meine Beiträge</h3>
      <div id="admin-posts-list"></div>
    </section>

    <section id="posts-list" class="posts-grid">
      <p id="posts-loading">Beiträge werden geladen…</p>
    </section>
  </main>

  <footer class="site-footer"><p>© Manuel Rio Zeltner</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/src/supabase-config.js"></script>
  <script src="/src/supabase-client.js"></script>
  <script src="/src/ui-feedback.js"></script>
  <script src="/src/image-upload.js"></script>
  <script src="/src/auth-ui.js"></script>
  <script src="/src/politik.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="/src/site-header.js"></script>
  <script src="/src/site-nav.js"></script>
</body>
</html>
