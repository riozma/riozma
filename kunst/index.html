<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kunst – Manuel Rio Zeltner</title>
  <link rel="icon" href="/src/img/favicon.svg">
  <meta name="description" content="riozmart – Kunstgalerie von Manuel Rio Zeltner.">
  <meta name="theme-color" content="#dbedd8">
  <link rel="canonical" href="https://riozma.ch/kunst/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Kunst – Manuel Rio Zeltner">
  <meta property="og:url" content="https://riozma.ch/kunst/">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="site-body">
  <header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-bg">
      <a class="navbar-brand" href="/">Manuel Rio Zeltner</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Navigation umschalten">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-lg-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="/kunst/">Kunst</a></li>
          <li class="nav-item"><a class="nav-link" href="/politik/">Politik</a></li>
          <li class="nav-item"><a class="nav-link" href="/trouvo/">Trouvo</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="kunst-main">
    <div id="kunst" class="section category">
      <div class="kunst-header">
        <div>
          <h1 class="section-heading">riozmart</h1>
          <p class="section-description">chli mölele</p>
        </div>
        <div id="auth-container" class="auth-container-slot"></div>
      </div>

      <section id="kunst-admin" class="admin-panel d-none">
        <h2>Neues Kunstwerk hinzufügen</h2>
        <form id="artwork-upload-form" class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="artwork-title-input">Titel</label>
            <input type="text" class="form-control" id="artwork-title-input" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="artwork-file">Bild</label>
            <input type="file" class="form-control" id="artwork-file" accept="image/jpeg,image/png,image/webp" required>
          </div>
          <div class="col-md-4">
            <label class="form-label" for="artwork-year-input">Jahr</label>
            <input type="text" class="form-control" id="artwork-year-input">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="artwork-size-input">Grösse</label>
            <input type="text" class="form-control" id="artwork-size-input">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="artwork-medium-input">Medium</label>
            <input type="text" class="form-control" id="artwork-medium-input" value="Acrylic on canvas">
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="artwork-available-input">
              <label class="form-check-label" for="artwork-available-input">Verfügbar</label>
            </div>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">Hochladen</button>
            <p id="artwork-upload-message" class="admin-message"></p>
          </div>
        </form>
      </section>

      <div class="sort-button-container">
        <button class="btn btn-outline-secondary" id="filter-button">verfüegbari azeige</button>
      </div>

      <div class="row artwork-preview" id="artwork-preview"></div>

      <div id="blackBox" class="art-overlay"></div>

      <dialog id="artwork-modal">
        <div class="modal-content">
          <div class="modal-body">
            <img src="" class="img-fluid artwork-modal-img" alt="">
            <button type="button" class="btn-close" aria-label="Schliessen" onclick="closeModal()"></button>
            <div class="card-body" id="artwork-info">
              <h5 class="card-title" id="artwork-title">Titel</h5>
              <p class="card-text" id="artwork-year">Jahr</p>
              <p class="card-text" id="artwork-size">Grösse</p>
              <p class="card-text" id="artwork-medium">Medium</p>
              <a href="" download="" class="btn btn-secondary" id="artwork-download">herunterladen</a>
              <div class="artwork-modal-avail d-none" id="artwork-avail-wrap">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="artwork-avail-input">
                  <label class="form-check-label" for="artwork-avail-input">Verfügbar (*)</label>
                </div>
              </div>
              <button type="button" class="btn btn-outline-danger btn-sm d-none" id="artwork-delete">Löschen</button>
            </div>
          </div>
        </div>
      </dialog>
    </div>
  </main>

  <footer class="site-footer"><p>© Manuel Rio Zeltner</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/src/supabase-config.js"></script>
  <script src="/src/supabase-client.js"></script>
  <script src="/src/ui-feedback.js"></script>
  <script src="/src/image-upload.js"></script>
  <script src="/src/auth-ui.js"></script>
  <script src="/src/kunst.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V"
    crossorigin="anonymous"></script>
</body>
</html>
