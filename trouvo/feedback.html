<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/src/site-init.js"></script>
  <title>Nachbesprechung – Trouvo</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="site-body">
  <header class="site-header" data-site-header data-header-context="trouvo"></header>
  <main class="trouvo-main">
    <p id="feedback-loading">Lade Nachbesprechung…</p>
    <div id="feedback-content" class="d-none">
      <p class="eyebrow mb-2">Nachbesprechung</p>
      <p class="text-muted small mb-4">Organisator-Notizen aus dem Feedback-Modus und Rückmeldungen von Gästen.</p>
      <section class="edit-section mb-4">
        <h2 class="h5">Organisator-Feedback</h2>
        <div id="organizer-feedback-list"></div>
      </section>
      <section class="edit-section">
        <h2 class="h5">Gäste-Feedback</h2>
        <div id="guest-feedback-list"></div>
      </section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/src/supabase-config.js"></script>
  <script src="/src/supabase-client.js"></script>
  <script src="/src/trouvo-feedback-review.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="/src/site-header.js"></script>
  <script src="/src/site-nav.js"></script>
</body>
</html>
