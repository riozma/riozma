<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/src/site-init.js"></script>
  <title>Anmeldungen – Trouvo</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="site-body">
  <header class="site-header" data-site-header data-header-context="trouvo"></header>

  <main class="trouvo-main">
    <p id="manage-loading">Lade Anmeldungen…</p>
    <div id="manage-content" class="d-none">
      <p class="eyebrow mb-2">Anmeldungen</p>
      <div class="manage-toolbar">
        <button type="button" class="btn btn-sm btn-outline-secondary" id="btn-export-csv">CSV exportieren</button>
        <button type="button" class="btn btn-sm btn-outline-primary" id="btn-copy-guest-link">Gast-Link kopieren</button>
      </div>
      <p id="manage-message" class="admin-message"></p>
      <div id="registrations-list" class="registrations-table-wrap"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/src/supabase-config.js"></script>
  <script src="/src/supabase-client.js"></script>
  <script src="/src/ui-feedback.js"></script>
  <script src="/src/trouvo-manage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="/src/site-header.js"></script>
  <script src="/src/site-nav.js"></script>
</body>
</html>
