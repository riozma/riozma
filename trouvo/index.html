<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link rel="icon" href="/src/img/favicon.svg">
  <meta name="description" content="Trouvo – Events planen, Gäste einladen und Anmeldungen verwalten.">

  <link rel="canonical" href="https://riozma.ch/trouvo/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Trouvo – Eventplanung">
  <meta property="og:url" content="https://riozma.ch/trouvo/">

<body class="site-body">
  <header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-light navbar-bg">
      <a class="navbar-brand" href="/">Manuel Rio Zeltner</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-lg-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/kunst/">Kunst</a></li>
          <li class="nav-item"><a class="nav-link" href="/politik/">Politik</a></li>
          <li class="nav-item"><a class="nav-link active" href="/trouvo/">Trouvo</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="trouvo-main">
    <section id="login-section" class="trouvo-login-section">
      <div class="trouvo-login-wrap">
        <a href="/trouvo/" class="trouvo-brand-link"><span class="trouvo-wordmark trouvo-wordmark-lg">Trouvo</span></a>
        <h1 class="section-heading">Eventplanung</h1>
        <p class="section-description">Plane Veranstaltungen, erstelle Anmeldelinks und koordiniere Mitbringsel.</p>
        <div id="auth-container"></div>
      </div>
    </section>

    <section id="dashboard-section" class="d-none">
      <div class="trouvo-dashboard-header">
        <div>
          <a href="/trouvo/" class="trouvo-brand-link"><span class="trouvo-wordmark">Trouvo</span></a>
          <h1 class="section-heading">Meine Veranstaltungen</h1>
        </div>
        <div class="trouvo-header-actions">
          <div id="auth-container-dashboard"></div>
          <a href="/trouvo/edit.html" class="btn btn-primary" id="btn-new-event">+ Neue Veranstaltung</a>
        </div>
      </div>

      <div class="trouvo-events-block">
        <h2>Kommende</h2>
        <div id="events-upcoming" class="event-list"></div>
      </div>
      <div class="trouvo-events-block">
        <h2>Vergangene</h2>
        <div id="events-past" class="event-list"></div>
      </div>
    </section>
  </main>
