<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/src/site-init.js"></script>
  <title>Anmeldung – riozma</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/src/img/favicon.svg">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="site-body">
  <main class="landing-main" style="text-align:center;padding:4rem 1rem;">
    <p id="auth-callback-status">Anmeldung wird abgeschlossen…</p>
    <p class="text-muted small"><a href="/trouvo/">Zurück zu Trouvo</a></p>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/src/supabase-config.js"></script>
  <script src="/src/supabase-client.js"></script>
  <script>
    (async function () {
      var status = document.getElementById("auth-callback-status");
  var returnTo = typeof getAuthReturnTo === "function" ? getAuthReturnTo() : (sessionStorage.getItem("auth_return_to") || "/trouvo/");

      restorePkceVerifierFromCookie();
      var client = getSupabase();
      if (!client) {
        status.textContent = "Anmeldung momentan nicht verfügbar.";
        return;
      }

      var result = await completeAuthFromUrl(client);
      if (result.error) {
        status.textContent = result.error;
        return;
      }

      var { data: { session } } = await client.auth.getSession();
      if (!session) {
        status.textContent = "Anmeldung fehlgeschlagen. Bitte erneut versuchen.";
        return;
      }

      location.replace(returnTo);
    })();
  </script>
</body>
</html>
